name: Train and Commit

on:
  push:
    branches: [main]

jobs:
  train:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # 🔥 MUHIM

    steps:
      - uses: actions/checkout@v3

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run training
        run: python app/train.py

      - name: Commit results
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add metrics.json app/model.pkl
          git commit -m "auto: update model + metrics" || echo "no changes"
          git push
