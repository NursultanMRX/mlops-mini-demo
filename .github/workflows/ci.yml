name: CI/CD

on:
  push:
    branches: [main]

jobs:
  test-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v0.1.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /root/mlops-demo
            git pull
            docker-compose up -d --build
