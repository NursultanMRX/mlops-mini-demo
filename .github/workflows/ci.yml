name: Train + Report

on:
  push:
    branches: [main]

jobs:
  train:
    if: "!contains(github.event.head_commit.message, 'auto:')"
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run training
        run: python app/train.py

      - name: Commit results
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add metrics.json metrics.png app/model.pkl
          git commit -m "auto: update metrics + model" || echo "no changes"
          git push
