name: Train Adult Income NN Pipeline

on:
  push:
    branches: [main]

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - uses: actions/checkout@v3

      # 2️⃣ Setup Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4️⃣ Download data from Google Drive
      - name: Download data from Google Drive
        run: |
         pip install google-api-python-client google-auth-httplib2 google-auth-oauthlib
         python app/download_data.py
        env:
          GDRIVE_KEY: ${{ secrets.GDRIVE_KEY }}

      # 5️⃣ Hyperparameter tuning (Optuna small trials)
      - name: Run Optuna tuning
        env:
          PYTHONPATH: .
        run: |
          python -m app.train_tune

      # 6️⃣ Full training with best parameters
      - name: Run final training
        env:
          PYTHONPATH: .
        run: |
          python -m app.train_final

      # 7️⃣ Upload artifacts
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: adult_income_artifacts
          path: |
            best_params.json
            app/final_model.keras
            metrics.png
